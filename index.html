<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>Secret App</title>
<style>
    /* --- ESTILOS GENERALES --- */
    body { background-color: #000; color: white; font-family: 'Arial', sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
    .screen { display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
    .active { display: flex; }
    
    h1 { color: #fff; text-shadow: 0 0 10px #ff0055; font-size: 2.2rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
    h2 { font-size: 1.5rem; color: #00e5ff; margin-bottom: 10px; }
    
    .btn { background: #111; border: 1px solid #333; color: white; padding: 18px; margin: 8px; width: 85%; max-width: 320px; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
    .btn:active { transform: scale(0.98); }
    .btn-action { background: linear-gradient(45deg, #ff0055, #bf00ff); border: none; color: white; font-size: 20px; margin-top: 20px; box-shadow: 0 0 15px rgba(255, 0, 85, 0.4); }

    /* BOTONES DE MODO DADOS */
    .mode-container { display: flex; gap: 5px; margin-bottom: 15px; }
    .btn-mode { padding: 8px 15px; font-size: 14px; background: #222; border: 1px solid #555; color: #aaa; border-radius: 20px; cursor: pointer; }
    .btn-mode.selected { background: #00e5ff; color: #000; font-weight: bold; border-color: #00e5ff; box-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }

    /* ESTILOS DE LA RULETA */
    .slots-container { display: flex; gap: 5px; width: 100%; max-width: 380px; justify-content: center; margin-bottom: 20px; }
    .reel-window { width: 32%; height: 120px; background: #1a1a1a; border: 2px solid #ff0055; border-radius: 10px; overflow: hidden; position: relative; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
    .reel-strip { display: flex; flex-direction: column; align-items: center; transition: transform 3s cubic-bezier(0.1, 0.9, 0.2, 1); }
    .reel-item { height: 120px; width: 100%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: bold; text-transform: uppercase; color: #fff; padding: 5px; box-sizing: border-box; text-shadow: 0 2px 4px rgba(0,0,0,0.5); border-bottom: 1px solid #333; word-wrap: break-word; }

    /* ESTILOS DE NIVELES */
    .lvl-1 { border-color: #00ff88; color: #00ff88; } /* Fácil */
    .lvl-2 { border-color: #ffaa00; color: #ffaa00; } /* Medio */
    .lvl-3 { border-color: #ff0055; color: #ff0055; } /* Difícil */
    
    .card { background: #1a1a1a; border: 1px solid #444; padding: 20px; border-radius: 20px; margin-bottom: 20px; width: 95%; max-width: 380px; min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 22px; }
    
    /* CORRECCIÓN: ESTILO PARA QUE LA FOTO NO DE ERROR */
    .pos-img { 
        width: 100%; 
        max-height: 300px; 
        object-fit: contain; 
        border-radius: 10px; 
        margin-bottom: 15px; 
        border: 2px solid #333;
        background-color: #000;
        display: block;
    }
    .pos-name {
        font-size: 24px;
        font-weight: bold;
        color: #00ff88;
        text-transform: uppercase;
        text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
    }

    input { padding: 15px; font-size: 24px; text-align: center; border-radius: 10px; border: 1px solid #555; background: #222; color: white; margin-bottom: 20px; width: 60%; outline: none; }
    .back-btn { background: transparent; border: none; color: #777; margin-top: 30px; text-decoration: underline; font-size: 16px; }
</style>
</head>
<body>

    <div id="loading" class="screen active"><h2>Cargando...</h2></div>

    <div id="login" class="screen">
        <h1>🔒 SECRET APP</h1>
        <input type="number" id="passInput" placeholder="PIN">
        <button class="btn btn-action" onclick="checkPass()">ENTRAR</button>
    </div>

    <div id="menu" class="screen">
        <h1>🔥 MENÚ 🔥</h1>
        <button class="btn" style="border-color:#00e5ff" onclick="nav('dados')">🎰 Ruleta Triple</button>
        <button class="btn" style="border-color:#ff0055" onclick="nav('menu_vr')">💋 Verdad o Reto</button>
        <button class="btn" style="border-color:#bf00ff" onclick="nav('menu_pos')">🧘 Posiciones</button>
    </div>

    <div id="dados" class="screen">
        <h2 style="color:#ff0055">RULETA TRIPLE</h2>
        <div class="mode-container">
            <button id="btnSuave" class="btn-mode" onclick="setMode('suave')">☁️ Suave</button>
            <button id="btnMix" class="btn-mode selected" onclick="setMode('mix')">🔀 Mix</button>
            <button id="btnPicante" class="btn-mode" onclick="setMode('picante')">🔥 Picante</button>
        </div>
        <div class="slots-container">
            <div class="reel-window"><div id="strip1" class="reel-strip"><div class="reel-item">❓</div></div></div>
            <div class="reel-window"><div id="strip2" class="reel-strip"><div class="reel-item">❓</div></div></div>
            <div class="reel-window" style="border-color:#00e5ff"><div id="strip3" class="reel-strip"><div class="reel-item">⏱️</div></div></div>
        </div>
        <button class="btn btn-action" onclick="spinRoulette()">¡GIRAR!</button>
        <button class="back-btn" onclick="nav('menu')">Volver</button>
    </div>

    <div id="menu_vr" class="screen">
        <h2>Elige Intensidad</h2>
        <button class="btn lvl-1" onclick="selectLevelVR('suave')">☁️ Suave</button>
        <button class="btn lvl-2" onclick="selectLevelVR('hot')">🔥 Hot</button>
        <button class="btn lvl-3" onclick="selectLevelVR('duro')">😈 Duro</button>
        <button class="btn lvl-4" style="border-color:#bf00ff; color:#bf00ff;" onclick="selectLevelVR('extremo')">💀 Extremo</button>
        <button class="back-btn" onclick="nav('menu')">Volver</button>
    </div>
    <div id="game_vr" class="screen">
        <h2 id="vrTitle">NIVEL</h2>
        <div id="vrCard" class="card">...</div>
        <div style="display:flex; gap:10px; width:100%; justify-content:center;">
            <button class="btn" style="border-color:#00e5ff; width:45%" onclick="playVR('verdad')">Verdad</button>
            <button class="btn" style="border-color:#ff0055; width:45%" onclick="playVR('reto')">Reto</button>
        </div>
        <button class="back-btn" onclick="nav('menu_vr')">Cambiar Nivel</button>
    </div>

    <div id="menu_pos" class="screen">
        <h2>Dificultad</h2>
        <button class="btn lvl-1" onclick="selectLevelPos('facil')">🟢 Fácil</button>
        <button class="btn lvl-2" onclick="selectLevelPos('medio')">🟠 Medio</button>
        <button class="btn lvl-3" onclick="selectLevelPos('dificil')">🔴 Difícil</button>
        <button class="back-btn" onclick="nav('menu')">Volver</button>
    </div>
    
    <div id="game_pos" class="screen">
        <h2 id="posTitle">POSICIÓN</h2>
        
        <div id="posCard" class="card" style="border:none; background:transparent;">
            <p>Pulsa siguiente...</p>
        </div>

        <button class="btn btn-action" onclick="playPos()">SIGUIENTE</button>
        <button class="back-btn" onclick="nav('menu_pos')">Cambiar</button>
    </div>

    <script src="posiciones.js"></script>
    <script src="preguntas.js"></script>
    <script src="dados.js"></script>

<script>
    const PASSWORD = "5425";
    let currentLevelVR = '';
    let currentLevelPos = '';
    let isSpinning = false;
    let diceMode = 'mix';

    window.onload = function() {
        // Pequeño retardo para asegurar que GitHub carga los archivos externos
        setTimeout(() => {
            if(window.DATOS_POSICIONES && window.DATOS_VR && window.DATOS_DADOS) {
                nav('login');
            } else {
                console.log("Carga forzada del login...");
                nav('login');
            }
        }, 500);
    };

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function checkPass() {
        if(document.getElementById('passInput').value === PASSWORD) nav('menu');
        else alert("Contraseña incorrecta");
    }
    function rand(arr) { 
        if(!arr || arr.length === 0) return null;
        return arr[Math.floor(Math.random() * arr.length)]; 
    }

    // --- RULETA ---
    function setMode(mode) {
        diceMode = mode;
        document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('selected'));
        if(mode === 'suave') document.getElementById('btnSuave').classList.add('selected');
        if(mode === 'mix') document.getElementById('btnMix').classList.add('selected');
        if(mode === 'picante') document.getElementById('btnPicante').classList.add('selected');
    }

    function spinRoulette() {
        if(isSpinning) return;
        isSpinning = true;

        const d = window.DATOS_DADOS;
        let pAcc = [], pPar = [], pTie = [];

        if (diceMode === 'suave') {
            pAcc = d.suave.acciones; pPar = d.suave.partes; pTie = d.suave.tiempos;
        } else if (diceMode === 'picante') {
            pAcc = d.picante.acciones; pPar = d.picante.partes; pTie = d.picante.tiempos;
        } else {
            pAcc = d.suave.acciones.concat(d.picante.acciones);
            pPar = d.suave.partes.concat(d.picante.partes);
            pTie = d.suave.tiempos.concat(d.picante.tiempos);
        }

        const gAcc = rand(pAcc); const gPar = rand(pPar); const gTie = rand(pTie);

        buildStrip('strip1', pAcc, gAcc);
        buildStrip('strip2', pPar, gPar);
        buildStrip('strip3', pTie, gTie);

        ['strip1', 'strip2', 'strip3'].forEach(id => {
            const el = document.getElementById(id);
            el.style.transition = 'none';
            el.style.transform = 'translateY(0)';
        });

        setTimeout(() => {
            const px = -120 * 30;
            document.getElementById('strip1').style.transition = 'transform 3s cubic-bezier(0.1, 0.9, 0.2, 1)';
            document.getElementById('strip1').style.transform = `translateY(${px}px)`;
            
            document.getElementById('strip2').style.transition = 'transform 3.5s cubic-bezier(0.1, 0.9, 0.2, 1)';
            document.getElementById('strip2').style.transform = `translateY(${px}px)`;
            
            document.getElementById('strip3').style.transition = 'transform 4s cubic-bezier(0.1, 0.9, 0.2, 1)';
            document.getElementById('strip3').style.transform = `translateY(${px}px)`;

            setTimeout(() => { isSpinning = false; }, 4000);
        }, 50);
    }

    function buildStrip(elementId, list, winner) {
        let html = "";
        for(let i=0; i<30; i++) html += `<div class="reel-item">${rand(list)}</div>`;
        html += `<div class="reel-item" style="color:#00ff88; text-shadow:0 0 10px #00ff88">${winner}</div>`;
        document.getElementById(elementId).innerHTML = html;
    }

    // --- VR ---
    function selectLevelVR(lvl) {
        currentLevelVR = lvl;
        document.getElementById('vrTitle').innerText = "NIVEL: " + lvl.toUpperCase();
        document.getElementById('vrCard').innerText = "¿Verdad o Reto?";
        nav('game_vr');
    }
    function playVR(tipo) {
        const list = window.DATOS_VR[currentLevelVR][tipo];
        const prefix = (tipo === 'verdad') ? "VERDAD: " : "RETO: ";
        document.getElementById('vrCard').innerText = prefix + rand(list);
    }

    // --- POSICIONES (CORRECCIÓN OBJETO) ---
    function selectLevelPos(lvl) {
        currentLevelPos = lvl;
        document.getElementById('posTitle').innerText = "DIFICULTAD: " + lvl.toUpperCase();
        document.getElementById('posCard').innerHTML = "<p>Pulsa siguiente...</p>";
        nav('game_pos');
    }

    function playPos() {
        // 1. Obtener la lista del nivel
        const list = window.DATOS_POSICIONES[currentLevelPos];
        
        // 2. Elegir una al azar
        const item = rand(list);
        
        if(!item) return;

        let html = "";
        
        // 3. Comprobar si es un objeto con foto o solo texto
        // Aquí estaba el error [object Object]. Ahora lo detectamos.
        if (typeof item === 'object' && item.nombre) {
            // Es un objeto (tiene foto y nombre)
            if(item.img && item.img.startsWith('http')) {
                html += `<img src="${item.img}" class="pos-img" alt="Posición">`;
            }
            html += `<div class="pos-name">${item.nombre}</div>`;
        } else {
            // Es solo texto (por si acaso quedaron datos viejos)
            html += `<div class="pos-name">${item}</div>`;
        }
        
        document.getElementById('posCard').innerHTML = html;
    }
</script>
</body>
</html>

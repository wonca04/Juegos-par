<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>Secret App</title>
<style>
    /* --- ESTILOS GENERALES --- */
    body { background-color: #000; color: white; font-family: 'Arial', sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
    .screen { display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
    .active { display: flex; }
    
    h1 { color: #fff; text-shadow: 0 0 10px #ff0055; font-size: 2.2rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
    h2 { font-size: 1.5rem; color: #00e5ff; margin-bottom: 20px; }
    
    /* BOTONES */
    .btn { background: #111; border: 1px solid #333; color: white; padding: 18px; margin: 8px; width: 85%; max-width: 320px; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
    .btn:active { transform: scale(0.98); }
    .btn-action { background: linear-gradient(45deg, #ff0055, #bf00ff); border: none; color: white; font-size: 20px; margin-top: 30px; box-shadow: 0 0 15px rgba(255, 0, 85, 0.4); }

    /* ESTILOS DE LA RULETA (SLOT MACHINE) */
    .slots-container {
        display: flex; gap: 10px; width: 100%; max-width: 350px; justify-content: center; margin-bottom: 20px;
    }
    .reel-window {
        width: 48%; height: 150px;
        background: #1a1a1a; border: 2px solid #ff0055; border-radius: 15px;
        overflow: hidden; /* Esto oculta lo que se sale de la caja */
        position: relative;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
    }
    .reel-strip {
        display: flex; flex-direction: column; align-items: center;
        transition: transform 3s cubic-bezier(0.1, 0.9, 0.2, 1); /* Animación suave */
    }
    .reel-item {
        height: 150px; width: 100%;
        display: flex; align-items: center; justify-content: center;
        font-size: 20px; font-weight: bold; text-transform: uppercase;
        color: #fff; padding: 10px; box-sizing: border-box;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5); border-bottom: 1px solid #333;
    }

    /* ESTILOS DE NIVELES */
    .lvl-1 { border-color: #00ff88; color: #00ff88; }
    .lvl-2 { border-color: #ffaa00; color: #ffaa00; }
    .lvl-3 { border-color: #ff0055; color: #ff0055; }
    .lvl-4 { border-color: #bf00ff; color: #bf00ff; }

    /* INPUTS Y TEXTOS */
    .card { background: #1a1a1a; border: 1px solid #444; padding: 30px; border-radius: 20px; margin-bottom: 20px; width: 90%; max-width: 350px; font-size: 22px; min-height: 120px; display: flex; align-items: center; justify-content: center; }
    input { padding: 15px; font-size: 24px; text-align: center; border-radius: 10px; border: 1px solid #555; background: #222; color: white; margin-bottom: 20px; width: 60%; outline: none; }
    .back-btn { background: transparent; border: none; color: #777; margin-top: 30px; text-decoration: underline; font-size: 16px; }
</style>
</head>
<body>

    <div id="loading" class="screen active">
        <h2>Cargando...</h2>
    </div>

    <div id="login" class="screen">
        <h1>🔒 SECRET APP</h1>
        <input type="number" id="passInput" placeholder="PIN">
        <button class="btn btn-action" onclick="checkPass()">ENTRAR</button>
    </div>

    <div id="menu" class="screen">
        <h1>🔥 MENÚ 🔥</h1>
        <button class="btn" style="border-color:#00e5ff" onclick="nav('dados')">🎰 Ruleta Hot</button>
        <button class="btn" style="border-color:#ff0055" onclick="nav('menu_vr')">💋 Verdad o Reto</button>
        <button class="btn" style="border-color:#bf00ff" onclick="nav('menu_pos')">🧘 Posiciones</button>
    </div>

    <div id="dados" class="screen">
        <h2 style="color:#ff0055">RULETA DEL PLACER</h2>
        
        <div class="slots-container">
            <div class="reel-window">
                <div id="strip1" class="reel-strip">
                    <div class="reel-item">❓</div>
                </div>
            </div>
            <div class="reel-window">
                <div id="strip2" class="reel-strip">
                    <div class="reel-item">❓</div>
                </div>
            </div>
        </div>

        <button class="btn btn-action" onclick="spinRoulette()">¡GIRAR!</button>
        <button class="back-btn" onclick="nav('menu')">Volver</button>
    </div>

    <div id="menu_vr" class="screen">
        <h2>Elige Intensidad</h2>
        <button class="btn lvl-1" onclick="selectLevelVR('suave')">☁️ Suave</button>
        <button class="btn lvl-2" onclick="selectLevelVR('hot')">🔥 Hot</button>
        <button class="btn lvl-3" onclick="selectLevelVR('duro')">😈 Duro</button>
        <button class="btn lvl-4" onclick="selectLevelVR('extremo')">💀 Extremo</button>
        <button class="back-btn" onclick="nav('menu')">Volver</button>
    </div>
    <div id="game_vr" class="screen">
        <h2 id="vrTitle">NIVEL</h2>
        <div id="vrCard" class="card">...</div>
        <div style="display:flex; gap:10px; width:100%; justify-content:center;">
            <button class="btn" style="border-color:#00e5ff; width:45%" onclick="playVR('verdad')">Verdad</button>
            <button class="btn" style="border-color:#ff0055; width:45%" onclick="playVR('reto')">Reto</button>
        </div>
        <button class="back-btn" onclick="nav('menu_vr')">Cambiar Nivel</button>
    </div>

    <div id="menu_pos" class="screen">
        <h2>Dificultad</h2>
        <button class="btn lvl-1" onclick="selectLevelPos('facil')">🟢 Fácil</button>
        <button class="btn lvl-2" onclick="selectLevelPos('medio')">🟠 Medio</button>
        <button class="btn lvl-3" onclick="selectLevelPos('dificil')">🔴 Difícil</button>
        <button class="btn lvl-4" onclick="selectLevelPos('extremo')">🟣 Extremo</button>
        <button class="back-btn" onclick="nav('menu')">Volver</button>
    </div>
    <div id="game_pos" class="screen">
        <h2 id="posTitle">POSICIÓN</h2>
        <div id="posCard" class="card">...</div>
        <button class="btn btn-action" onclick="playPos()">SIGUIENTE</button>
        <button class="back-btn" onclick="nav('menu_pos')">Cambiar</button>
    </div>

    <script src="posiciones.js"></script>
    <script src="preguntas.js"></script>
    <script src="dados.js"></script>

<script>
    const PASSWORD = "5425";
    let currentLevelVR = '';
    let currentLevelPos = '';
    let isSpinning = false; // Para evitar pulsar dos veces seguido

    window.onload = function() {
        // Comprobación de seguridad
        if(window.DATOS_POSICIONES && window.DATOS_VR && window.DATOS_DADOS) {
            nav('login');
        } else {
            // Si falla, intentamos cargar igual por si acaso
            console.log("Aviso: Datos no detectados al inicio, intentando igual.");
            nav('login');
        }
    };

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function checkPass() {
        if(document.getElementById('passInput').value === PASSWORD) nav('menu');
        else alert("Contraseña incorrecta");
    }

    function rand(arr) { 
        if(!arr || arr.length === 0) return "Faltan datos";
        return arr[Math.floor(Math.random() * arr.length)]; 
    }

    // --- LÓGICA DE LA RULETA (NUEVO) ---
    function spinRoulette() {
        if(isSpinning) return; // Si ya gira, no hacer nada
        isSpinning = true;

        // 1. Obtener opciones del archivo dados.js
        const listaAcciones = window.DATOS_DADOS.acciones;
        const listaPartes = window.DATOS_DADOS.partes;

        // 2. Elegir ganadores
        const ganadorAccion = rand(listaAcciones);
        const ganadorParte = rand(listaPartes);

        // 3. Generar tiras largas para simular giro
        // Creamos una lista HTML con 30 items aleatorios + el ganador al final
        buildStrip('strip1', listaAcciones, ganadorAccion);
        buildStrip('strip2', listaPartes, ganadorParte);

        // 4. Resetear posición (truco visual)
        document.getElementById('strip1').style.transition = 'none';
        document.getElementById('strip1').style.transform = 'translateY(0)';
        document.getElementById('strip2').style.transition = 'none';
        document.getElementById('strip2').style.transform = 'translateY(0)';

        // 5. Forzar el navegador a "darse cuenta" del reset antes de animar
        setTimeout(() => {
            // Aplicar animación hacia abajo (al final de la tira)
            // Calculamos: -150px (altura item) * 30 items
            const pixelDesplazamiento = -150 * 30; 
            
            const s1 = document.getElementById('strip1');
            s1.style.transition = 'transform 3s cubic-bezier(0.1, 0.9, 0.2, 1)';
            s1.style.transform = `translateY(${pixelDesplazamiento}px)`;

            const s2 = document.getElementById('strip2');
            s2.style.transition = 'transform 3.5s cubic-bezier(0.1, 0.9, 0.2, 1)'; // Un poco más lento para efecto
            s2.style.transform = `translateY(${pixelDesplazamiento}px)`;

            // Liberar botón cuando termine
            setTimeout(() => { isSpinning = false; }, 3500);
        }, 50);
    }

    function buildStrip(elementId, listaOpciones, ganador) {
        let html = "";
        // Añadir 30 opciones aleatorias de relleno
        for(let i=0; i<30; i++) {
            html += `<div class="reel-item">${rand(listaOpciones)}</div>`;
        }
        // Añadir el ganador al final (posición 31)
        html += `<div class="reel-item" style="color:#00ff88; text-shadow:0 0 10px #00ff88">${ganador}</div>`;
        
        document.getElementById(elementId).innerHTML = html;
    }

    // --- LÓGICA VR y POSICIONES (IGUAL QUE ANTES) ---
    function selectLevelVR(lvl) {
        currentLevelVR = lvl;
        document.getElementById('vrTitle').innerText = "NIVEL: " + lvl.toUpperCase();
        document.getElementById('vrCard').innerText = "¿Verdad o Reto?";
        nav('game_vr');
    }
    function playVR(tipo) {
        const list = window.DATOS_VR[currentLevelVR][tipo];
        const prefix = (tipo === 'verdad') ? "VERDAD: " : "RETO: ";
        document.getElementById('vrCard').innerText = prefix + rand(list);
    }
    function selectLevelPos(lvl) {
        currentLevelPos = lvl;
        document.getElementById('posTitle').innerText = "DIFICULTAD: " + lvl.toUpperCase();
        document.getElementById('posCard').innerText = "Pulsa siguiente...";
        nav('game_pos');
    }
    function playPos() {
        const list = window.DATOS_POSICIONES[currentLevelPos];
        document.getElementById('posCard').innerText = rand(list);
    }
</script>
</body>
</html>
